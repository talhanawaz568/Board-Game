apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardgame-deployment
  namespace: webapps
spec:
  selector:
    matchLabels:
      app: boardgame
  replicas: 1 # Set to 1 to save resources on Slave 1
  template:
    metadata:
      labels:
        app: boardgame
    spec:
      containers:
        - name: boardgame
          image: talha884/boardshack:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          # Fix 1: Resource management to prevent CrashLoopBackOff on Slave 1
          resources:
            requests:
              memory: "700Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # Fix 2: Health checks to prevent unnecessary restarts
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90 # Increased delay for Java 21 startup
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: boardgame-ssvc
  namespace: webapps
spec:
  selector:
    app: boardgame
  ports:
    - protocol: "TCP"
      port: 80
      targetPort: 8080
      nodePort: 31178 # Explicitly setting the port for your browser access
  type: NodePort # Changed from LoadBalancer to NodePort for manual EC2 clusters
